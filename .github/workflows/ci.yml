name: CI

# Automatic runs are OFF (2026-07-23, operator: CI was burning the account's
# free Actions minutes). Nothing about the pipeline has been deleted — only its
# triggers. Run it by hand from the Actions tab ("CI" -> "Run workflow"), or
# with `gh workflow run ci.yml`.
#
# To turn it back on, delete the comment markers below and drop
# `workflow_dispatch` if you do not want the manual button.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:

jobs:
  backend:
    name: backend · lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # The suite runs against a real Postgres: the schema uses JSONB and PL/pgSQL
    # triggers (the append-only audit log), so SQLite would test a different
    # database than we ship. See backend/tests/conftest.py.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: opd
          POSTGRES_PASSWORD: opd_local_dev
          POSTGRES_DB: opd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opd"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # No native Postgres to collide with on the runner, so 5432 is free here.
      TEST_DATABASE_URL: postgresql+asyncpg://opd:opd_local_dev@localhost:5432/opd_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: python -m pytest -q

  voice-gw:
    name: voice-gw · lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: voice-gw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest httpx ruff
      - run: ruff check .
      - run: python -m pytest -q

  web:
    name: web · lint + typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  infra:
    name: infra · terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - run: terraform init -backend=false -input=false
      - run: terraform fmt -check -recursive
      - run: terraform validate

  images:
    name: docker · build images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build api image
        run: docker build -t opd-api ./backend
      - name: Build voice-gw image
        run: docker build -t opd-voice-gw ./voice-gw
      - name: Build web image
        run: docker build -t opd-web ./web
