# Full local stack for the OPD Intelligence Platform (doc 05 §3).
# `make dev` brings this up; the same file (with the prod override) deploys to
# the single EC2 box. Every service has a healthcheck + restart policy.

x-restart: &restart
  restart: unless-stopped

# The seed data + authored tree bank live in repo-root `seeds/`, which is outside
# the backend build context (`./backend`), so it isn't baked into the image. The
# code reads it at `/seeds` (app.seed.SEEDS_DIR, app.trees.bank.TREES_DIR resolve
# there in-container) — for seeding AND at runtime (the kiosk bundle + routing
# read the trees), so every backend service mounts it read-only.
x-seeds: &seeds
  - ./seeds:/seeds:ro

services:
  postgres:
    image: postgres:16
    <<: *restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opd_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-opd}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Host 5433: a native Postgres already owns 127.0.0.1:5432 on the dev
      # machine, and it wins over Docker's bind — localhost:5432 would silently
      # reach the wrong database. Same reason voice-gw is on 8090. In-cluster
      # traffic still uses postgres:5432. Override the host port via .env
      # (POSTGRES_HOST_PORT) when 5433 is taken on the target box.
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opd}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    <<: *restart
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    <<: *restart
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-opd}:${POSTGRES_PASSWORD:-opd_local_dev}@postgres:5432/${POSTGRES_DB:-opd}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: *seeds
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  voice-gw:
    build: ./voice-gw
    <<: *restart
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      # Host 8090 (container stays 8080) to avoid clashing with other local
      # dev projects that commonly grab 8080; Caddy talks to voice-gw:8080.
      - "${VOICE_GW_HOST_PORT:-8090}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  worker:
    build: ./backend
    <<: *restart
    command: ["celery", "-A", "app.worker:celery_app", "worker", "--loglevel=info"]
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes: *seeds
    depends_on:
      redis:
        condition: service_healthy

  beat:
    build: ./backend
    <<: *restart
    command: ["celery", "-A", "app.worker:celery_app", "beat", "--loglevel=info"]
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes: *seeds
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
      # NEXT_PUBLIC_* are baked into the browser bundle at build time (see
      # web/Dockerfile). The browser talks to the api at its *published* host
      # port, so on a box where the api isn't on 8000, set NEXT_PUBLIC_API_BASE
      # in .env to match API_HOST_PORT. NEXT_PUBLIC_KIOSK_SERVER_STT=1 turns on
      # local Whisper for the kiosk mic (doc 08).
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
        NEXT_PUBLIC_KIOSK_SERVER_STT: ${NEXT_PUBLIC_KIOSK_SERVER_STT:-0}
    <<: *restart
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    depends_on:
      - api
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    healthcheck:
      # node is guaranteed present in node:22-slim; wget/curl are not.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  caddy:
    image: caddy:2
    <<: *restart
    depends_on:
      - api
      - web
      - voice-gw
    ports:
      # Caddy is the public TLS front door. On a box already running nginx (or any
      # web server) on 80/443, either don't start caddy — bring up only the core
      # services — or set CADDY_HTTP_PORT/CADDY_HTTPS_PORT in .env to free ports.
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config

  loki:
    image: grafana/loki:2.9.8
    <<: *restart
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "${LOKI_HOST_PORT:-3100}:3100"

  grafana:
    image: grafana/grafana:11.1.0
    <<: *restart
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - grafanadata:/var/lib/grafana
    ports:
      - "${GRAFANA_HOST_PORT:-3001}:3000"
    depends_on:
      - loki

  uptime-kuma:
    image: louislam/uptime-kuma:1
    <<: *restart
    volumes:
      - kumadata:/app/data
    ports:
      - "${KUMA_HOST_PORT:-3002}:3001"

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
  grafanadata:
  kumadata:
