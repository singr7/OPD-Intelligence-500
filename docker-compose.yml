# Full local stack for the OPD Intelligence Platform (doc 05 §3).
# `make dev` brings this up; the same file (with the prod override) deploys to
# the single EC2 box. Every service has a healthcheck + restart policy.

x-restart: &restart
  restart: unless-stopped

services:
  postgres:
    image: postgres:16
    <<: *restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opd_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-opd}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opd}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    <<: *restart
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    <<: *restart
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-opd}:${POSTGRES_PASSWORD:-opd_local_dev}@postgres:5432/${POSTGRES_DB:-opd}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  voice-gw:
    build: ./voice-gw
    <<: *restart
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  worker:
    build: ./backend
    <<: *restart
    command: ["celery", "-A", "app.worker:make_celery", "worker", "--loglevel=info"]
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  beat:
    build: ./backend
    <<: *restart
    command: ["celery", "-A", "app.worker:make_celery", "beat", "--loglevel=info"]
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  web:
    build: ./web
    <<: *restart
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  caddy:
    image: caddy:2
    <<: *restart
    depends_on:
      - api
      - web
      - voice-gw
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config

  loki:
    image: grafana/loki:2.9.8
    <<: *restart
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:11.1.0
    <<: *restart
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - grafanadata:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - loki

  uptime-kuma:
    image: louislam/uptime-kuma:1
    <<: *restart
    volumes:
      - kumadata:/app/data
    ports:
      - "3002:3001"

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
  grafanadata:
  kumadata:
